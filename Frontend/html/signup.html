<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentRank AI - Sign Up</title>
  <link rel="stylesheet" href="../css/signup.css">
</head>
<body>

  <div class="signup-container">
    <h2 class="title">Create Account</h2>
    <p class="subtitle">Join TalentRank AI and start ranking talent smarter</p>

    <form id="signupForm">
      <div class="input-group">
        <input type="text" id="username" name="username" placeholder="Username" required>
      </div>
      <div class="input-group">
        <input type="password" id="password" name="password" placeholder="Password" required>
      </div>
      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <p id="signupStatus" class="status-msg"></p>
    <p class="login-text">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="../js/signup.js"></script>
</body>
</html>
