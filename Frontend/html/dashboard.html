<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentRank AI - Dashboard</title>
  <link rel="stylesheet" href="/Frontend/css/style.css">
</head>
<body>

<header>
  <h1>TalentRank AI Dashboard</h1>
</header>

<main>
  <section class="dashboard-section">
    <h2>Top 10 Candidates</h2>
    <div id="candidateCards" class="cards-container">
      <!-- JS will populate cards here -->
    </div>
    <p id="status"></p>
  </section>
</main>

<script>
// Populate Top 10 candidates dynamically
const container = document.getElementById("candidateCards");
const status = document.getElementById("status");

// Fetch top_10 data from localStorage (set by index.html analyze)
const top10 = JSON.parse(localStorage.getItem("top_10") || "[]");

if(top10.length === 0) {
    status.innerText = "No candidates found. Please analyze resumes first.";
} else {
    status.innerText = `Showing ${top10.length} top candidates:`;
    top10.forEach((candidate, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${candidate.name || "Candidate " + (i+1)}</h3>
            <p>Score: ${candidate.score || "N/A"}</p>
            <a href="${candidate.resume_path || '#'}" download>Download Resume</a>
        `;
        container.appendChild(card);
    });
}
</script>

</body>
</html>
